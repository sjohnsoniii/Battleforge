<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle Forge | SJ3 Labs</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #080808;
      color: #f5f5f5;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 760px;
      padding: 42px;
      border-radius: 28px;
      background: rgba(255,255,255,0.06);
      border: 1px solid #222;
      box-shadow: 0 30px 100px rgba(0,0,0,0.45);
    }

    h1 {
      font-size: clamp(3rem, 8vw, 6rem);
      margin: 0 0 16px;
      letter-spacing: -0.06em;
    }

    p {
      color: #b8b8b8;
      font-size: 1.15rem;
    }

    .tag {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid #333;
      color: #ffb86b;
    }

    a {
      color: #9fffd9;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="tag">SJ3 Labs Project</div>
    <h1>Battle Forge</h1>
    <p>
      A tactical experiment is being forged here. Strategy, systems, and controlled digital violence,
      because apparently peaceful productivity was too boring.
    </p>
    <p><a href="https://sj3labs.com">← Back to SJ3 Labs</a></p>
  </main>
</body>
</html>
